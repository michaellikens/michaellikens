name: Generate Pacman Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Pacman Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: michaellikens
          output_file: output/pacman-contribution-graph.svg

      - name: Generate Dark Mode Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: michaellikens
          theme: dark
          output_file: output/pacman-contribution-graph-dark.svg

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/
          git commit -m "Update pacman graph" || exit 0
          git push
